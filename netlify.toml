[build]
  base = "frontend/"
  command = "npm run build"
  publish = "build"

[build.environment]
  REACT_APP_API_URL = "https://phonepay-api-backend-1.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://phonepay-api-backend-1.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
