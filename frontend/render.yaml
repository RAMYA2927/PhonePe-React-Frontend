services:
  - type: web
    name: phonepay-frontend
    env: static
    buildCommand: "cd frontend && npm run build"
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://phonepay-api-backend-1.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
